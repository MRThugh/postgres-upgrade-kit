name: PostgreSQL Upgrade Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Build image and push to DockerHub ─────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.upgrade.tag }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        upgrade:
          - tag: "9.6-to-16"
            dockerfile: "upgrades/9.6-to-16/Dockerfile"
          # Add new upgrade paths here, e.g.:
          # - tag: "13-to-16"
          #   dockerfile: "upgrades/13-to-16/Dockerfile"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.upgrade.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}
          cache-to: type=inline

  # ── Run the full upgrade pipeline ─────────────────────────────────────────
  test-upgrade:
    name: Test Upgrade (${{ matrix.upgrade.tag }})
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      fail-fast: false
      matrix:
        upgrade:
          - tag: "9.6-to-16"
            from_version: "9.6"
            to_version: "16"

    steps:
      - name: Pull image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }}

      - name: Create Docker volumes
        run: |
          docker volume create pg-old-data-${{ matrix.upgrade.from_version }}
          docker volume create pg-new-data-${{ matrix.upgrade.to_version }}

      # Step A: Initialise PostgreSQL <old> with test data
      - name: Init PostgreSQL ${{ matrix.upgrade.from_version }} cluster
        run: |
          docker run --rm \
            -v pg-old-data-${{ matrix.upgrade.from_version }}:/var/lib/postgresql/${{ matrix.upgrade.from_version }}/main \
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            init-old

      # Step B: Upgrade via pg_upgrade
      - name: Run pg_upgrade (${{ matrix.upgrade.from_version }} → ${{ matrix.upgrade.to_version }})
        run: |
          docker run --rm \
            -v pg-old-data-${{ matrix.upgrade.from_version }}:/var/lib/postgresql/${{ matrix.upgrade.from_version }}/main \
            -v pg-new-data-${{ matrix.upgrade.to_version }}:/var/lib/postgresql/${{ matrix.upgrade.to_version }}/main \
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            upgrade

      # Step C: Verify the upgraded cluster
      - name: Verify PostgreSQL ${{ matrix.upgrade.to_version }} cluster
        run: |
          docker run --rm \
            -v pg-new-data-${{ matrix.upgrade.to_version }}:/var/lib/postgresql/${{ matrix.upgrade.to_version }}/main \
            ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade:${{ matrix.upgrade.tag }}-${{ github.sha }} \
            verify

      - name: Cleanup volumes
        if: always()
        run: |
          docker volume rm \
            pg-old-data-${{ matrix.upgrade.from_version }} \
            pg-new-data-${{ matrix.upgrade.to_version }} || true
