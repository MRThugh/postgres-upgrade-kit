name: PostgreSQL 9.6 → 16 Upgrade Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pg-upgrade

jobs:
  # ── Job 1: Build image and push to DockerHub ─────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  # ── Job 2: Run the full upgrade pipeline ─────────────────────────────────
  test-upgrade:
    name: Test pg_upgrade (9.6 → 16)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Pull pg-upgrade image
        run: docker pull ${{ env.IMAGE }}:${{ github.sha }}

      - name: Create Docker volumes
        run: |
          docker volume create pg-old-data
          docker volume create pg-new-data

      # ── Step A: Initialize PostgreSQL 9.6 with test data ────────────────
      - name: Initialize PostgreSQL 9.6 cluster and seed test databases
        run: |
          docker run --rm \
            -v pg-old-data:/var/lib/postgresql/9.6/main \
            ${{ env.IMAGE }}:${{ github.sha }} init-old

      # ── Step B: Upgrade from 9.6 to 16 via pg_upgrade ──────────────────
      - name: Run pg_upgrade (9.6 → 16)
        run: |
          docker run --rm \
            -v pg-old-data:/var/lib/postgresql/9.6/main \
            -v pg-new-data:/var/lib/postgresql/16/main \
            ${{ env.IMAGE }}:${{ github.sha }} upgrade

      # ── Step C: Verify the upgraded PostgreSQL 16 cluster ───────────────
      - name: Verify PostgreSQL 16 cluster integrity
        run: |
          docker run --rm \
            -v pg-new-data:/var/lib/postgresql/16/main \
            ${{ env.IMAGE }}:${{ github.sha }} verify

      # ── Cleanup ──────────────────────────────────────────────────────────
      - name: Remove Docker volumes
        if: always()
        run: |
          docker volume rm pg-old-data pg-new-data || true
